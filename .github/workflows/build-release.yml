name: Build and Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      version: ${{ steps.flags.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG="$COMMIT_MSG"
          VERSION=$(grep -E '^mod_version\s*=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

          BUILD=false
          RELEASE=false

          if echo "$MSG" | grep -qi "build release"; then
            BUILD=true
            RELEASE=true
          elif echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi

          echo "should_build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "should_release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "📋 Flags: build=$BUILD release=$RELEASE"

  build:
    name: Build
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      - name: Validate Gradle wrapper
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "::error::gradle-wrapper.jar not found!"
            exit 1
          fi
          echo "✅ gradle-wrapper.jar exists"
          ls -lh gradle/wrapper/

      - name: Grant execute permission
        run: |
          chmod +x gradlew
          chmod +x gradle/wrapper/gradle-wrapper.jar || true
          ls -la gradlew*
          echo "=== Checking file type ==="
          file ./gradlew

      - name: Show Gradle wrapper info
        run: |
          echo "=== Gradle wrapper properties ==="
          cat gradle/wrapper/gradle-wrapper.properties
          echo ""
          echo "=== Gradle wrapper jar ==="
          ls -lh gradle/wrapper/gradle-wrapper.jar

      - name: Build with Gradle
        run: |
          echo "=== Java version ==="
          java -version
          echo ""
          echo "=== Testing gradlew directly ==="
          file ./gradlew
          head -5 ./gradlew
          echo ""
          echo "=== Running gradlew --version ==="
          ./gradlew --version
          echo ""
          echo "=== Running Gradle build ==="
          ./gradlew build --no-daemon --stacktrace
          echo "=== Build completed ==="

      - name: List build outputs
        run: |
          echo "=== Build directory ==="
          ls -la build/ 2>/dev/null || echo "build/ not found"
          echo ""
          echo "=== Libs directory ==="
          ls -la build/libs/ 2>/dev/null || echo "build/libs/ not found"

      - name: Verify build artifacts
        run: |
          if [ ! -d "build/libs" ]; then
            echo "::error::build/libs directory not found!"
            exit 1
          fi
          
          JAR_COUNT=$(find build/libs -name "*.jar" | wc -l)
          if [ "$JAR_COUNT" -eq 0 ]; then
            echo "::error::No JAR files found in build/libs/"
            exit 1
          fi
          
          echo "✅ Found $JAR_COUNT JAR file(s)"
          ls -lh build/libs/*.jar

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/*.jar
          retention-days: 7
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/

      - name: List downloaded files
        run: |
          echo "Downloaded artifacts:"
          ls -lh build/libs/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: Release v${{ needs.check.outputs.version }}
          body: |
            Automated release for version v${{ needs.check.outputs.version }}
          files: build/libs/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}