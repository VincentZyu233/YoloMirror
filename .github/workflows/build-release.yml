name: Build and Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'LICENSE.txt'
      - '.gitignore'

permissions:
  contents: write

jobs:
  # ── 判断是否需要构建 / 发布 ──────────────────────────────
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      version: ${{ steps.flags.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG="$COMMIT_MSG"

          # 从 gradle.properties 提取版本号
          VERSION=$(grep -E '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

          # 初始化标志
          BUILD=false
          RELEASE=false

          # "build release" = 构建 + GitHub Release
          if echo "$MSG" | grep -qi "build release"; then
            BUILD=true
            RELEASE=true
          # "build action" = 仅构建
          elif echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi

          echo "should_build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "should_release=$RELEASE" >> "$GITHUB_OUTPUT"

          echo "📋 Flags: build=$BUILD release=$RELEASE"

  # ── 构建 ───────────────────────────────────────────────
  build:
    name: Build
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # gradle-wrapper.jar 没有提交到仓库，从 GitHub raw 下载
      - name: Download gradle-wrapper.jar
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          WRAPPER_URL="https://raw.githubusercontent.com/gradle/gradle/v9.2.1/gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "Downloading gradle-wrapper.jar ..."
            mkdir -p gradle/wrapper
            curl -fsSL "$WRAPPER_URL" -o "$WRAPPER_JAR"
            echo "Downloaded: $(du -sh $WRAPPER_JAR)"
          else
            echo "gradle-wrapper.jar already exists, skipping."
          fi

      - name: Build with Gradle Wrapper
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/*.jar
          retention-days: 7

  # ── 发布到 GitHub Releases ──────────────────────────────
  release:
    name: Publish Release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/

      - name: List downloaded files
        run: |
          echo "Downloaded artifacts:"
          ls -lh build/libs/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: Release v${{ needs.check.outputs.version }}
          body: |
            Automated release for version v${{ needs.check.outputs.version }}
          files: build/libs/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
