name: Build and Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  # ── 判断是否需要构建 / 发布 ──────────────────────────────
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      version: ${{ steps.flags.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG="$COMMIT_MSG"

          # 从 gradle.properties 提取版本号
          VERSION=$(grep -E '^mod_version\s*=' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

          # 初始化标志
          BUILD=false
          RELEASE=false

          # "build release" = 构建 + GitHub Release
          if echo "$MSG" | grep -qi "build release"; then
            BUILD=true
            RELEASE=true
          # "build action" = 仅构建
          elif echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi

          echo "should_build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "should_release=$RELEASE" >> "$GITHUB_OUTPUT"

          echo "📋 Flags: build=$BUILD release=$RELEASE"

  # ── 构建 ───────────────────────────────────────────────
  build:
    name: Build
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 验证 gradle-wrapper.jar 存在
      - name: Verify gradle-wrapper.jar
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ -f "$WRAPPER_JAR" ]; then
            echo "✓ gradle-wrapper.jar exists"
            ls -lh "$WRAPPER_JAR"
          else
            echo "✗ gradle-wrapper.jar not found!"
            exit 1
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build --stacktrace --info

      - name: Check build outputs
        run: |
          echo "=== Build directory contents ==="
          ls -la build/ 2>/dev/null || echo "build/ directory not found"
          echo ""
          echo "=== libs directory contents ==="
          ls -la build/libs/ 2>/dev/null || echo "build/libs/ directory not found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/*.jar
          retention-days: 7
          if-no-files-found: error

  # ── 发布到 GitHub Releases ──────────────────────────────
  release:
    name: Publish Release
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/libs/

      - name: List downloaded files
        run: |
          echo "Downloaded artifacts:"
          ls -lh build/libs/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: Release v${{ needs.check.outputs.version }}
          body: |
            Automated release for version v${{ needs.check.outputs.version }}
          files: build/libs/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
